<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onde está o médico?</title>
</head>
<body>
  <h1>Onde está o médico?</h1>

<p class="sub1">
Busque médicos da rede municipal de saúde de Barretos por local de atendimento, especialidade e período.
</p>

<div class="filtros">

        <select id="local">
            <option value="">Local</option>
        </select>

        <select id="especialidade">
            <option value="">Especialidade</option>
        </select>

        <select id="periodo">
            <option value="">Período</option>
        </select>
    <button id="buscar">
            🔍
        </button>

    </div>

    <table id="resultado">

        <thead>
            <tr>
                <th>Local</th>
                <th>Médico</th>
                <th>Especialidade</th>
                <th>Período</th>
                <th>Horário</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>
    <script src="script.js"></script>
</body>
</html>
